<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>TahfidzKu</title>

<style>
body{

background:#f3f7f4;

color:white;
padding:20px;
border-radius:15px;
text-align:center;
}

.menu{
display:grid;
grid-template-columns:repeat(2,1fr);

}

.card{

padding:20px;
border-radius:15px;
text-align:center;
font-size:20px;
box-shadow:0 3px 8px rgba(0,0,0,.15);
}

.stat{
background:white;
padding:15px;
margin-top:15px;
border-radius:15px;
font-size:18px;
}
</style>

</head>

<body>

<div class="header">

</div>

<div class="stat">

</div>

<div class="stat">
📖 Setoran Hari Ini : 0
</div>

<div class="stat">
🎯 Target Tercapai : 0
</div>

<div class="menu">

<div class="card">
👥<br>Santri
</div>

<div class="card">
➕<br>Input Setoran
</div>

<div class="card">
📊<br>Rekap
</div>

<div class="card">

</div>

</div>

</body>
</html>
