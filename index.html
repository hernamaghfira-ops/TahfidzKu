<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>TahfidzKu</title>

<style>
body{
font-family:Arial,sans-serif;
background:#eef5ef;
margin:0;
padding:20px;
}

.container{
max-width:900px;
margin:auto;
}

h1{
background:#2E7D32;
color:white;
padding:20px;
border-radius:10px;
text-align:center;
}

.card{
background:white;
padding:20px;
border-radius:10px;
margin-top:20px;
box-shadow:0 2px 8px rgba(0,0,0,.1);
}

input,textarea,select{
width:100%;
padding:10px;
margin:8px 0;
border-radius:6px;
border:1px solid #ccc;
box-sizing:border-box;
}

button{
background:#2E7D32;
color:white;
padding:12px;
border:none;
border-radius:6px;
cursor:pointer;
width:100%;
font-size:16px;
}

button:hover{
background:#1B5E20;
}

table{
width:100%;
border-collapse:collapse;
margin-top:15px;
}

th,td{
border:1px solid #ddd;
padding:10px;
text-align:center;
}

th{
background:#2E7D32;
color:white;
}

.good{
color:green;
font-weight:bold;
}

.bad{
color:red;
font-weight:bold;
}
</style>

</head>
<body>

<div class="container">

<h1>📖 TahfidzKu</h1>

<div class="card">

<h2>Input Hafalan Hari Ini</h2>

<input id="tanggal" type="date">

<input id="surah" placeholder="Nama Surah">

<input id="ayat" placeholder="Ayat (contoh 1-10)">

<input id="nilai" type="number" placeholder="Nilai (0-100)">

<select id="target">
<option value="Tercapai">✅ Target Tercapai</option>
<option value="Belum">❌ Belum Tercapai</option>
</select>

<textarea id="catatan" placeholder="Catatan Guru"></textarea>

<input id="besok" placeholder="Target Besok">

<button onclick="simpan()">Simpan</button>

</div>

<div class="card">

<h2>Perkembangan Hafalan</h2>

<table>

<thead>

<tr>

<th>Tanggal</th>

<th>Surah</th>

<th>Ayat</th>

<th>Nilai</th>

<th>Status</th>

<th>Target Besok</th>

</tr>

</thead>

<tbody id="data">

</tbody>

</table>

</div>

</div>

<script>

let daftar=[];

function simpan(){

let t=document.getElementById("tanggal").value;
let s=document.getElementById("surah").value;
let a=document.getElementById("ayat").value;
let n=document.getElementById("nilai").value;
let st=document.getElementById("target").value;
let b=document.getElementById("besok").value;

daftar.push({
tanggal:t,
surah:s,
ayat:a,
nilai:n,
status:st,
besok:b
});

tampil();

}

function tampil(){

let isi="";

daftar.forEach(x=>{

isi+=`
<tr>

<td>${x.tanggal}</td>

<td>${x.surah}</td>

<td>${x.ayat}</td>

<td>${x.nilai}</td>

<td class="${x.status=="Tercapai"?"good":"bad"}">${x.status}</td>

<td>${x.besok}</td>

</tr>
`;

});

document.getElementById("data").innerHTML=isi;

}

</script>

</body>
</html>
